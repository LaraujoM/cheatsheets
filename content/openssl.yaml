category: openssl
icon: 🔐
description: Certificates, keys, and encryption from the command line
commands:
  - name: Generate RSA private key
    command: openssl genrsa -out key.pem 4096
    description: Generate a 4096-bit RSA private key
    tags: [rsa, key, generate]

  - name: Generate private key with passphrase
    command: openssl genrsa -aes256 -out key.pem 4096
    description: Generate an RSA key encrypted with AES-256
    tags: [rsa, key, passphrase, encrypt]

  - name: Extract public key
    command: openssl rsa -in key.pem -pubout -out pub.pem
    description: Extract the public key from a private key file
    tags: [rsa, public, extract]

  - name: Generate CSR
    command: openssl req -new -key key.pem -out request.csr
    description: Generate a Certificate Signing Request from a private key
    tags: [csr, certificate, request]

  - name: Self-signed certificate
    command: openssl req -x509 -newkey rsa:4096 -keyout key.pem -out cert.pem -days 365 -nodes
    description: Generate a self-signed certificate valid for 365 days
    tags: [certificate, self-signed, x509]

  - name: View certificate
    command: openssl x509 -in cert.pem -text -noout
    description: Display the contents of a certificate in human-readable form
    tags: [certificate, inspect, x509]

  - name: Check certificate expiry
    command: openssl x509 -in cert.pem -noout -dates
    description: Show the validity dates of a certificate
    tags: [certificate, expiry, dates]

  - name: Check remote certificate
    command: openssl s_client -connect example.com:443 </dev/null 2>/dev/null | openssl x509 -noout -dates
    description: Check the expiry dates of a remote server's TLS certificate
    tags: [tls, remote, expiry, server]

  - name: Verify certificate against CA
    command: openssl verify -CAfile ca.pem cert.pem
    description: Verify a certificate against a CA bundle
    tags: [verify, ca, certificate]

  - name: Convert PEM to DER
    command: openssl x509 -in cert.pem -outform DER -out cert.der
    description: Convert a certificate from PEM to DER format
    tags: [convert, pem, der]

  - name: Convert PEM to PKCS12
    command: openssl pkcs12 -export -in cert.pem -inkey key.pem -out bundle.p12
    description: Bundle a certificate and private key into a PKCS12 file
    tags: [convert, pkcs12, p12]

  - name: Encrypt a file
    command: openssl enc -aes-256-cbc -pbkdf2 -in file.txt -out file.enc
    description: Encrypt a file with AES-256-CBC
    tags: [encrypt, aes, file]

  - name: Decrypt a file
    command: openssl enc -d -aes-256-cbc -pbkdf2 -in file.enc -out file.txt
    description: Decrypt an AES-256-CBC encrypted file
    tags: [decrypt, aes, file]

  - name: Generate random bytes (hex)
    command: openssl rand -hex 32
    description: Generate 32 cryptographically random bytes as hex
    tags: [random, hex, bytes]

  - name: Hash a file (SHA-256)
    command: openssl dgst -sha256 file.txt
    description: Compute the SHA-256 digest of a file
    tags: [hash, sha256, digest]
